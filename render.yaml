services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: examnight-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Hugging Face inference token — set this in Render dashboard
      - key: HF_TOKEN
        sync: false
      # Comma-separated list of allowed frontend origins
      # e.g. https://examnight.netlify.app
      - key: CORS_ORIGINS
        sync: false
      # Hugging Face model repo ID (optional override)
      # default: Qwen/Qwen2.5-7B-Instruct
      - key: HUGGINGFACE_REPO_ID
        sync: false
      # MongoDB Atlas connection string for user auth
      # e.g. mongodb+srv://user:pass@cluster.mongodb.net/examnight?retryWrites=true&w=majority
      - key: MONGODB_URI
        sync: false
      # Strong random secret for JWT signing — generate: openssl rand -hex 32
      - key: JWT_SECRET
        sync: false
      # How long login tokens stay valid in hours (default: 24)
      - key: JWT_EXPIRE_HOURS
        value: "24"
